spring.application.name=Cerebro Connect

# Server settings
server.port=${PORT:9090}
server.address=0.0.0.0

# MySQL Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/cerebro_connect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:cerebro_user}
spring.datasource.password=${DB_PASSWORD:your_secure_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# FIXED: Connection pool settings to prevent dropped connections
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

# JWT
jwt.secret=${JWT_SECRET:your-super-long-random-secret-key-change-this-immediately-1234567890abcdef}
jwt.expiration=86400

# Logging
logging.level.org.springframework=INFO
logging.level.com.cerebro=DEBUG
logging.level.org.springframework.security=DEBUG

# CORS
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*