spring.application.name=Cerebro Connect

# Server settings
server.port=9090

# MySQL Database (update with your credentials)
spring.datasource.url=jdbc:mysql://localhost:3306/cerebro_connect?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=cerebro_user
spring.datasource.password=your_secure_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JWT Secret (generate a strong one, at least 256 bits / 32 characters)
jwt.secret=your-super-long-random-secret-key-change-this-immediately-1234567890abcdef

# JWT Expiration (in seconds ? 86400 = 24 hours)
jwt.expiration=86400

# Optional: Logging level (useful during development)
logging.level.org.springframework=INFO
logging.level.com.cerebro=DEBUG
logging.level.org.springframework.security=DEBUG
spring.web.cors.allowed-origins=http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
server.address=0.0.0.0

# Extra: Log SQL queries (uncomment for debugging DB calls)
# logging.level.org.springframework.jdbc=DEBUG
